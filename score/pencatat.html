<!doctype html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pencatat Markah SUKANTARA SKKJ 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');
    body { font-family: 'Sora', system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-red-100 text-slate-900">
  <main class="mx-auto max-w-5xl p-4 md:p-6">
    <header class="rounded-2xl border border-orange-200 bg-white/90 p-4 shadow-sm md:p-6">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 class="text-xl font-extrabold md:text-3xl">Pencatat Markah SUKANTARA SKKJ 2026</h1>
          <p class="mt-1 text-sm text-slate-600">Mode laju: pilih rumah, tekan 2/1/0 markah.</p>
        </div>
        <div id="syncStatus" class="rounded-full bg-rose-100 px-3 py-1 text-xs font-bold uppercase text-rose-700">Offline</div>
      </div>

      <div class="mt-4 grid gap-3 md:grid-cols-2">
        <label class="block">
          <span class="text-xs font-bold uppercase text-slate-500">Nama Acara</span>
          <input id="titleInput" type="text" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none ring-orange-400 focus:ring" placeholder="Contoh: SUKANTARA SKKJ 2026" />
        </label>
        <label class="block">
          <span class="text-xs font-bold uppercase text-slate-500">Pusingan / Acara Ke</span>
          <input id="roundInput" type="number" min="0" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none ring-orange-400 focus:ring" value="1" />
        </label>
      </div>

      <div class="mt-3">
        <span class="text-xs font-bold uppercase text-slate-500">Acara Semasa</span>
        <div id="eventButtons" class="mt-1 grid grid-cols-2 gap-2"></div>
      </div>

      <div class="mt-3">
        <span class="text-xs font-bold uppercase text-slate-500">Kategori</span>
        <div id="genderButtons" class="mt-1 grid grid-cols-2 gap-2"></div>
      </div>
    </header>

    <section class="mt-5 rounded-2xl border border-orange-200 bg-white/90 p-4 shadow-sm">
      <h2 class="text-sm font-extrabold uppercase tracking-wide text-slate-700">Pilih Rumah</h2>
      <div id="quickTeamButtons" class="mt-3 grid grid-cols-2 gap-2 md:grid-cols-4"></div>

      <h2 class="mt-4 text-sm font-extrabold uppercase tracking-wide text-slate-700">Tambah Markah</h2>
      <div class="mt-3 grid grid-cols-3 gap-2 md:max-w-md">
        <button data-quick-points="2" class="rounded-xl bg-emerald-600 px-4 py-3 text-base font-extrabold text-white hover:bg-emerald-500">2 MARKAH</button>
        <button data-quick-points="1" class="rounded-xl bg-amber-500 px-4 py-3 text-base font-extrabold text-white hover:bg-amber-400">1 MARKAH</button>
        <button data-quick-points="0" class="rounded-xl bg-slate-300 px-4 py-3 text-base font-extrabold text-slate-800 hover:bg-slate-200">0 MARKAH</button>
      </div>
      <div id="quickHint" class="mt-3 rounded-xl bg-slate-100 px-3 py-2 text-sm font-bold text-slate-700">Rumah dipilih: Rumah Merah</div>
    </section>

    <section id="teamGrid" class="mt-5 grid gap-3 md:grid-cols-2"></section>

    <footer class="mt-5 flex flex-wrap gap-2">
      <button id="saveBtn" class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-bold text-white hover:bg-slate-800">Simpan & Hantar Live</button>
      <button id="exportPdfBtn" class="rounded-xl bg-emerald-700 px-4 py-2 text-sm font-bold text-white hover:bg-emerald-600">Export PDF</button>
      <button id="resetBtn" class="rounded-xl bg-rose-600 px-4 py-2 text-sm font-bold text-white hover:bg-rose-500">Reset Semua Mata</button>
      <a href="/tv" target="_blank" class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-bold text-white hover:bg-indigo-500">Buka Paparan TV</a>
    </footer>
  </main>

<script>
const DEFAULT_TEAMS = [
  { key: 'A', name: 'Rumah Merah', quickClass: 'bg-red-600 text-white border-red-700' },
  { key: 'B', name: 'Rumah Biru', quickClass: 'bg-blue-600 text-white border-blue-700' },
  { key: 'C', name: 'Rumah Hijau', quickClass: 'bg-green-600 text-white border-green-700' },
  { key: 'D', name: 'Rumah Kuning', quickClass: 'bg-yellow-300 text-black border-yellow-400' }
];
const EVENT_OPTIONS = ['Larian 80m', 'Lompat Jauh'];
const GENDER_OPTIONS = ['Lelaki', 'Perempuan'];

const state = {
  title: 'SUKANTARA SKKJ 2026',
  event: 'Larian 80m',
  category: 'Lelaki',
  round: 1,
  teamNames: Object.fromEntries(DEFAULT_TEAMS.map((t) => [t.key, t.name])),
  scores: Object.fromEntries(DEFAULT_TEAMS.map((t) => [t.key, 0])),
  details: Object.fromEntries(DEFAULT_TEAMS.map((t) => [t.key, {}]))
};

let selectedTeamKey = 'A';

const syncStatus = document.getElementById('syncStatus');
const titleInput = document.getElementById('titleInput');
const roundInput = document.getElementById('roundInput');
const eventButtons = document.getElementById('eventButtons');
const genderButtons = document.getElementById('genderButtons');
const teamGrid = document.getElementById('teamGrid');
const quickTeamButtons = document.getElementById('quickTeamButtons');
const quickHint = document.getElementById('quickHint');
const saveBtn = document.getElementById('saveBtn');
const exportPdfBtn = document.getElementById('exportPdfBtn');
const resetBtn = document.getElementById('resetBtn');

function setSync(isOnline) {
  if (isOnline) {
    syncStatus.textContent = 'Live';
    syncStatus.className = 'rounded-full bg-emerald-100 px-3 py-1 text-xs font-bold uppercase text-emerald-700';
    return;
  }
  syncStatus.textContent = 'Offline';
  syncStatus.className = 'rounded-full bg-rose-100 px-3 py-1 text-xs font-bold uppercase text-rose-700';
}

function triggerHaptic(points) {
  if (!('vibrate' in navigator)) return;
  if (points === 2) {
    navigator.vibrate([18, 25, 18]);
    return;
  }
  if (points === 1) {
    navigator.vibrate(20);
    return;
  }
  navigator.vibrate(8);
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function buildBucketKey(eventName, categoryName) {
  return `${eventName}||${categoryName}`;
}

function parseBucketKey(bucketKey) {
  const [eventName, categoryName] = String(bucketKey).split('||');
  return {
    eventName: eventName || '-',
    categoryName: categoryName || '-'
  };
}

function ensureDetailBucket(teamKey, eventName, categoryName) {
  if (!state.details[teamKey] || typeof state.details[teamKey] !== 'object') state.details[teamKey] = {};
  const bucketKey = buildBucketKey(eventName, categoryName);
  if (!state.details[teamKey][bucketKey]) {
    state.details[teamKey][bucketKey] = { c2: 0, c1: 0, c0: 0 };
  }
  return state.details[teamKey][bucketKey];
}

function recordQuickPress(teamKey, points) {
  const bucket = ensureDetailBucket(teamKey, state.event, state.category);
  if (points === 2) bucket.c2 += 1;
  if (points === 1) bucket.c1 += 1;
  if (points === 0) bucket.c0 += 1;
}

function buildDetailRowsHtml(teamKey) {
  const teamDetails = state.details[teamKey] || {};
  const keys = Object.keys(teamDetails).sort();
  if (!keys.length) {
    return '<tr><td colspan="6" class="border border-slate-300 px-2 py-2 text-center text-slate-500">Belum ada rekod tekan.</td></tr>';
  }
  return keys.map((bucketKey) => {
    const row = teamDetails[bucketKey] || { c2: 0, c1: 0, c0: 0 };
    const meta = parseBucketKey(bucketKey);
    const subtotal = (row.c2 * 2) + row.c1;
    return `<tr>
      <td class="border border-slate-300 px-2 py-1">${escapeHtml(meta.eventName)}</td>
      <td class="border border-slate-300 px-2 py-1">${escapeHtml(meta.categoryName)}</td>
      <td class="border border-slate-300 px-2 py-1 text-center">${row.c2}</td>
      <td class="border border-slate-300 px-2 py-1 text-center">${row.c1}</td>
      <td class="border border-slate-300 px-2 py-1 text-center">${row.c0}</td>
      <td class="border border-slate-300 px-2 py-1 text-right">${subtotal}</td>
    </tr>`;
  }).join('');
}

function renderQuickTeams() {
  quickTeamButtons.innerHTML = '';
  DEFAULT_TEAMS.forEach((team) => {
    const button = document.createElement('button');
    button.type = 'button';
    button.dataset.team = team.key;
    const active = selectedTeamKey === team.key ? 'ring-4 ring-slate-700 scale-[1.02]' : 'opacity-90';
    button.className = `rounded-xl border px-3 py-3 text-sm font-extrabold transition ${team.quickClass} ${active}`;
    button.textContent = state.teamNames[team.key] || team.name;
    quickTeamButtons.appendChild(button);
  });
  const selectedName = state.teamNames[selectedTeamKey] || selectedTeamKey;
  quickHint.textContent = `Rumah dipilih: ${selectedName} | Acara: ${state.event} | Kategori: ${state.category}`;
}

function renderEventButtons() {
  eventButtons.innerHTML = '';
  EVENT_OPTIONS.forEach((name) => {
    const isActive = state.event === name;
    const button = document.createElement('button');
    button.type = 'button';
    button.dataset.event = name;
    button.className = `rounded-xl border px-3 py-2 text-sm font-extrabold transition ${
      isActive ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'
    }`;
    button.textContent = name;
    eventButtons.appendChild(button);
  });
}

function renderGenderButtons() {
  genderButtons.innerHTML = '';
  GENDER_OPTIONS.forEach((name) => {
    const isActive = state.category === name;
    const button = document.createElement('button');
    button.type = 'button';
    button.dataset.gender = name;
    button.className = `rounded-xl border px-3 py-2 text-sm font-extrabold transition ${
      isActive ? 'bg-indigo-700 text-white border-indigo-700' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'
    }`;
    button.textContent = name;
    genderButtons.appendChild(button);
  });
}

function renderTeams() {
  teamGrid.innerHTML = '';
  Object.keys(state.teamNames).forEach((key) => {
    const card = document.createElement('article');
    card.className = 'rounded-2xl border border-slate-200 bg-white p-4 shadow-sm';
    const detailRows = buildDetailRowsHtml(key);
    card.innerHTML = `
      <label class="block">
        <span class="text-xs font-bold uppercase text-slate-500">Nama Rumah (${key})</span>
        <input data-role="name" data-key="${key}" type="text" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none ring-orange-400 focus:ring" />
      </label>
      <div class="mt-3 flex items-center justify-between">
        <span class="text-xs font-bold uppercase text-slate-500">Markah</span>
        <div class="flex items-center gap-2">
          <button data-role="minus" data-key="${key}" class="h-10 w-10 rounded-xl bg-slate-200 text-lg font-extrabold hover:bg-slate-300">-</button>
          <input data-role="score" data-key="${key}" type="number" min="0" class="h-10 w-20 rounded-xl border border-slate-300 text-center text-lg font-extrabold outline-none ring-orange-400 focus:ring" />
          <button data-role="plus" data-key="${key}" class="h-10 w-10 rounded-xl bg-slate-900 text-lg font-extrabold text-white hover:bg-slate-800">+</button>
        </div>
      </div>
      <details class="mt-3 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">
        <summary class="cursor-pointer text-xs font-extrabold uppercase tracking-wide text-slate-700">More / Detail</summary>
        <div class="mt-2 overflow-auto">
          <table class="w-full border-collapse text-xs">
            <thead>
              <tr>
                <th class="border border-slate-300 px-2 py-1 text-left">Acara</th>
                <th class="border border-slate-300 px-2 py-1 text-left">Kategori</th>
                <th class="border border-slate-300 px-2 py-1 text-center">2x</th>
                <th class="border border-slate-300 px-2 py-1 text-center">1x</th>
                <th class="border border-slate-300 px-2 py-1 text-center">0x</th>
                <th class="border border-slate-300 px-2 py-1 text-right">Sub-total</th>
              </tr>
            </thead>
            <tbody>${detailRows}</tbody>
          </table>
        </div>
      </details>
    `;
    teamGrid.appendChild(card);
  });

  titleInput.value = state.title;
  if (!EVENT_OPTIONS.includes(state.event)) state.event = EVENT_OPTIONS[0];
  if (!GENDER_OPTIONS.includes(state.category)) state.category = GENDER_OPTIONS[0];
  roundInput.value = String(state.round);
  syncFormFromState();
  renderEventButtons();
  renderGenderButtons();
  renderQuickTeams();
}

function syncFormFromState() {
  Object.keys(state.teamNames).forEach((key) => {
    const nameInput = document.querySelector(`[data-role="name"][data-key="${key}"]`);
    const scoreInput = document.querySelector(`[data-role="score"][data-key="${key}"]`);
    if (nameInput) nameInput.value = state.teamNames[key];
    if (scoreInput) scoreInput.value = String(state.scores[key] || 0);
  });
}

function collectFormToState() {
  state.title = (titleInput.value || 'SUKANTARA SKKJ 2026').trim();
  if (!EVENT_OPTIONS.includes(state.event)) state.event = EVENT_OPTIONS[0];
  if (!GENDER_OPTIONS.includes(state.category)) state.category = GENDER_OPTIONS[0];
  state.round = Number(roundInput.value) || 0;
  Object.keys(state.teamNames).forEach((key) => {
    const nameInput = document.querySelector(`[data-role="name"][data-key="${key}"]`);
    const scoreInput = document.querySelector(`[data-role="score"][data-key="${key}"]`);
    state.teamNames[key] = (nameInput?.value || key).trim();
    state.scores[key] = Math.max(0, Number(scoreInput?.value) || 0);
    if (!state.details[key]) state.details[key] = {};
  });
}

function buildSortedTeams() {
  return Object.keys(state.teamNames)
    .map((key) => ({
      key,
      name: state.teamNames[key] || key,
      score: Math.max(0, Number(state.scores[key]) || 0)
    }))
    .sort((a, b) => {
      const diff = b.score - a.score;
      if (diff !== 0) return diff;
      return a.key.localeCompare(b.key);
    });
}

function emitState() {
  collectFormToState();
  socket.emit('state:update', {
    round: state.round,
    scores: state.scores,
    details: state.details,
    settings: {
      title: state.title,
      eventName: `${state.event} - ${state.category}`,
      eventType: state.event,
      genderCategory: state.category,
      teamNames: state.teamNames,
      useExternalScoreboard: true
    }
  });
  renderEventButtons();
  renderGenderButtons();
  renderQuickTeams();
}

function addPointsToSelectedTeam(points) {
  const key = selectedTeamKey;
  state.scores[key] = Math.max(0, Number(state.scores[key]) || 0) + points;
  recordQuickPress(key, points);
  triggerHaptic(points);
  syncFormFromState();
  emitState();
}

function exportPdfReport() {
  collectFormToState();
  const sorted = buildSortedTeams();
  const detailRows = [];
  const now = new Date();
  const reportTime = now.toLocaleString('ms-MY', { hour12: false });

  const rows = sorted.map((team, idx) => `
    <tr>
      <td>${idx + 1}</td>
      <td>${escapeHtml(team.name)}</td>
      <td>${team.score}</td>
    </tr>
  `).join('');

  sorted.forEach((team) => {
    const teamDetails = state.details[team.key] || {};
    const detailKeys = Object.keys(teamDetails).sort();
    if (!detailKeys.length) return;
    detailKeys.forEach((bucketKey) => {
      const row = teamDetails[bucketKey] || { c2: 0, c1: 0, c0: 0 };
      const meta = parseBucketKey(bucketKey);
      const subtotal = (row.c2 * 2) + row.c1;
      detailRows.push(`
      <tr>
        <td>${escapeHtml(team.name)}</td>
        <td>${escapeHtml(meta.eventName)}</td>
        <td>${escapeHtml(meta.categoryName)}</td>
        <td>${row.c2}</td>
        <td>${row.c1}</td>
        <td>${row.c0}</td>
        <td>${subtotal}</td>
      </tr>
      `);
    });
  });

  const detailTableRows = detailRows.join('') || `
    <tr>
      <td colspan="7" style="text-align:center;color:#6b7280;">Belum ada rekod tekan.</td>
    </tr>
  `;

  const html = `<!doctype html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <title>Laporan Markah - ${escapeHtml(state.title)}</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; color: #111827; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    h2 { margin: 24px 0 8px; font-size: 18px; }
    .meta { margin: 0 0 4px; font-size: 14px; color: #374151; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #d1d5db; padding: 10px; text-align: left; font-size: 14px; }
    th { background: #f3f4f6; }
    .right { text-align: right; }
    @media print { body { padding: 0; } }
  </style>
</head>
<body>
  <h1>${escapeHtml(state.title)}</h1>
  <p class="meta"><strong>Acara:</strong> ${escapeHtml(state.event || '-')}</p>
  <p class="meta"><strong>Kategori:</strong> ${escapeHtml(state.category || '-')}</p>
  <p class="meta"><strong>Pusingan:</strong> ${escapeHtml(state.round)}</p>
  <p class="meta"><strong>Masa Export:</strong> ${escapeHtml(reportTime)}</p>

  <h2>Ranking Semasa</h2>
  <table>
    <thead>
      <tr>
        <th style="width: 80px;">Ranking</th>
        <th>Rumah</th>
        <th class="right" style="width: 120px;">Markah</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>

  <h2>Detail Rekod Tekan</h2>
  <table>
    <thead>
      <tr>
        <th>Rumah</th>
        <th>Acara</th>
        <th>Kategori</th>
        <th>2x</th>
        <th>1x</th>
        <th>0x</th>
        <th>Sub-total</th>
      </tr>
    </thead>
    <tbody>${detailTableRows}</tbody>
  </table>
</body>
</html>`;

  const printWindow = window.open('', '_blank', 'width=900,height=700');
  if (!printWindow) {
    alert('Popup disekat browser. Benarkan popup untuk export PDF.');
    return;
  }
  printWindow.document.open();
  printWindow.document.write(html);
  printWindow.document.close();
  printWindow.focus();
  setTimeout(() => {
    printWindow.print();
  }, 300);
}

const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });

socket.on('connect', () => {
  setSync(true);
  socket.emit('state:register', { role: 'scorer', clientId: `scorer-${Math.random().toString(36).slice(2, 10)}` });
  emitState();
});

socket.on('disconnect', () => setSync(false));

socket.on('state:init', (payload) => {
  if (!payload) return;
  if (typeof payload.round === 'number') state.round = payload.round;
  if (payload.settings?.title) state.title = payload.settings.title;
  if (payload.settings?.eventType) state.event = payload.settings.eventType;
  if (payload.settings?.genderCategory) state.category = payload.settings.genderCategory;
  if (!payload.settings?.eventType && payload.settings?.eventName) {
    const [eventName, categoryName] = String(payload.settings.eventName).split(' - ').map((x) => x.trim());
    if (eventName) state.event = eventName;
    if (categoryName) state.category = categoryName;
  }
  if (payload.settings?.teamNames) {
    Object.keys(payload.settings.teamNames).forEach((key) => {
      if (!(key in state.teamNames)) state.teamNames[key] = key;
      state.teamNames[key] = payload.settings.teamNames[key] || key;
      if (!(key in state.scores)) state.scores[key] = 0;
      if (!(key in state.details)) state.details[key] = {};
    });
  }
  if (payload.scores) {
    Object.keys(payload.scores).forEach((key) => {
      if (!(key in state.scores)) state.scores[key] = 0;
      state.scores[key] = Math.max(0, Number(payload.scores[key]) || 0);
      if (!(key in state.teamNames)) state.teamNames[key] = key;
      if (!(key in state.details)) state.details[key] = {};
    });
  }
  if (payload.details && typeof payload.details === 'object') {
    Object.keys(payload.details).forEach((teamKey) => {
      const teamDetails = payload.details[teamKey];
      if (!teamDetails || typeof teamDetails !== 'object') return;
      if (!(teamKey in state.details)) state.details[teamKey] = {};
      state.details[teamKey] = teamDetails;
    });
  }
  renderTeams();
});

quickTeamButtons.addEventListener('click', (event) => {
  const button = event.target.closest('button[data-team]');
  if (!button) return;
  selectedTeamKey = button.dataset.team;
  renderQuickTeams();
});

eventButtons.addEventListener('click', (event) => {
  const button = event.target.closest('button[data-event]');
  if (!button) return;
  state.event = button.dataset.event;
  emitState();
});

genderButtons.addEventListener('click', (event) => {
  const button = event.target.closest('button[data-gender]');
  if (!button) return;
  state.category = button.dataset.gender;
  emitState();
});

document.addEventListener('click', (event) => {
  const button = event.target.closest('button[data-quick-points]');
  if (!button) return;
  const points = Math.max(0, Number(button.dataset.quickPoints) || 0);
  addPointsToSelectedTeam(points);
});

teamGrid.addEventListener('click', (event) => {
  const button = event.target.closest('button[data-key]');
  if (!button) return;
  const key = button.dataset.key;
  const scoreInput = document.querySelector(`[data-role="score"][data-key="${key}"]`);
  const current = Math.max(0, Number(scoreInput?.value) || 0);
  if (button.dataset.role === 'plus') scoreInput.value = String(current + 1);
  if (button.dataset.role === 'minus') scoreInput.value = String(Math.max(0, current - 1));
  emitState();
});

teamGrid.addEventListener('input', (event) => {
  if (!event.target.matches('input[data-role="name"], input[data-role="score"]')) return;
  emitState();
});

titleInput.addEventListener('input', emitState);
roundInput.addEventListener('input', emitState);
saveBtn.addEventListener('click', emitState);
exportPdfBtn.addEventListener('click', exportPdfReport);
resetBtn.addEventListener('click', () => {
  Object.keys(state.scores).forEach((key) => { state.scores[key] = 0; });
  Object.keys(state.details).forEach((key) => { state.details[key] = {}; });
  syncFormFromState();
  emitState();
});

renderTeams();
</script>
</body>
</html>
